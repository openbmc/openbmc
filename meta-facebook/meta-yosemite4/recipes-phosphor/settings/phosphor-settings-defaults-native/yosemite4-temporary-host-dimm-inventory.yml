/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A5: *dimm_template_{}
/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A6: *dimm_template_{}
/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A7: *dimm_template_{}
/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A8: *dimm_template_{}
/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A9: *dimm_template_{}
/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A10: *dimm_template_{}
/xyz/openbmc_project/inventory/system/board/Sentinel_Dome_Slot_{}_DIMM_A11: *dimm_template_{}

# Wailua Falls CXL DIMMs (present in slots with Sentinel Dome T2 board config only)
