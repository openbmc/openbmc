# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "nxp-layer"
BBFILE_PATTERN_nxp-layer = "^${LAYERDIR}/"
BBFILE_PRIORITY_nxp-layer = "6"

LAYERVERSION_nxp-layer = "1"
LAYERSERIES_COMPAT_nxp-layer = "wrynose whinlatter"
